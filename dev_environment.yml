# MIDAS dev environment: midas_env_dev
# midas-* packages install from GitHub source (marinerhemant/MIDAS@master, subdirectory per package).
# All other packages are pinned to the original env's versions.
#
# Create:   conda env create -f dev_environment.yml
# Update midas pkgs after GitHub changes:
#   pip install --upgrade --force-reinstall --no-deps \
#     "git+https://github.com/marinerhemant/MIDAS.git@master#subdirectory=packages/<pkg_dir>"
# To track your fork instead, replace marinerhemant/MIDAS with d-beniwal/MIDAS.
name: midas_env_dev
