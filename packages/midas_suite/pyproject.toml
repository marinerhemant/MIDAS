[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-suite"
version = "0.3.16"
description = "Meta-package: installs the MIDAS Python pipeline (FF/NF/PF HEDM, calibration, peakfit, integration, transforms, ODF, stress)."
readme = "README.md"
license = { text = "BSD-3-Clause" }
authors = [{ name = "Hemant Sharma", email = "hsharma@anl.gov" }]
requires-python = ">=3.9"
keywords = [
    "MIDAS", "HEDM", "3DXRD", "powder diffraction", "tomography",
    "DCT", "Laue", "synchrotron", "crystallography", "PyTorch",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]

# Floors pinned to the current PyPI version of each sub-package as of
# 2026-05-26. Bump only when a meta-package change actually requires it.
# The hidden in-tree packages (midas-grain-odf, midas-joint-ff-calibrate,
# midas-pf-odf, midas-pink) are intentionally absent — they're listed
# in the workflow HIDDEN set and never ship to PyPI.
dependencies = [
    # leaves
    "midas-distortion>=0.2.0",     # shared radial-distortion model + RhoD-units guard
    "midas-stress>=0.7.0",
    "midas-params>=0.3.4",
    "midas-hkls>=0.4.1",
    "midas-diffract>=0.1.2",
    "midas-peakfit>=0.4.0",
    "midas-integrate>=0.4.0",
    "midas-integrate-v2>=0.1.0",
    "midas-calibrate>=0.2.7",
    "midas-calibrate-v2>=0.3.3",
    "midas-index>=0.5.2",
    "midas-transforms>=0.4.2",
    "midas-propagate>=0.1.0",      # uncertainty propagation; load-bearing for process-grains v0.4.x Stage 7 σ
    "midas-uq>=0.1.0",             # refiner-anchored bootstrap UQ (per-grain trust_score_anchored)
    "midas-process-grains>=0.4.6", # v0.4.6: v4 Stage 6 recovers real per-grain GrainRadius on c-omp refiner outputs (was reading PF placeholder=1.0)
    "midas-fit-grain>=0.2.1",
    "midas-nf-preprocess>=0.1.1",
    "midas-nf-fitorientation>=0.3.1",
    "midas-zipper>=0.1.0",         # raw → .MIDAS.zip ingest (pip-portable, no C/source-tree dep)
    # parsl + pipeline orchestrators
    "midas-parsl-configs>=0.1.0",
    "midas-ff-pipeline>=0.4.0",    # DEPRECATED → use midas-pipeline --scan-mode ff; removed in suite 1.0
    "midas-nf-pipeline>=0.1.0",
    "midas-pipeline>=0.4.9",       # >=0.4.9: unified FF orchestrator — DetectorConfig, cross_det_merge, discovery+batch, ff_seeding, eta_coverage, sr_midas shim, reprocess, full global_powder, CLI auto-resolve, simulate + 7 ported notebooks
]

[project.optional-dependencies]
# Modality bundles for users who don't want the full pipeline.
# Each bundle pulls only what its target workflow needs; sub-package
# transitive deps fill in the rest. The ff/nf extras intentionally pull
# the corresponding pipeline orchestrator at the top — that package's
# own dep list pulls everything it needs underneath.
ff = [
    "midas-stress>=0.7.0",
    "midas-params>=0.3.4",
    "midas-ff-pipeline>=0.4.0",    # DEPRECATED → use midas-pipeline --scan-mode ff; removed in suite 1.0
    "midas-calibrate>=0.2.7",          # >=0.2.7: paramstest parser strips ';' terminator
    "midas-integrate>=0.4.0",
    "midas-joint-ff-calibrate>=0.1.5", # grain-tx + full-joint refine (IUCrJ 2026)
]
nf = [
    "midas-stress>=0.7.0",
    "midas-params>=0.3.4",
    "midas-nf-pipeline>=0.1.0",
]
pf = [
    # Point-focus / scanning HEDM (pf-HEDM). midas-pipeline runs in
    # --scan-mode pf and pulls index + fit-grain + transforms +
    # stress transitively; we list the orchestrator at the top.
    "midas-stress>=0.7.0",
    "midas-params>=0.3.4",
    "midas-pipeline[fast]>=0.4.9",         # >=0.4.9: unified FF orchestrator; fast = numba>=0.65
    "midas-calibrate>=0.2.7",
    "midas-integrate>=0.4.0",
]
calib = [
    "midas-hkls>=0.4.1",
    "midas-integrate>=0.4.0",
    "midas-peakfit>=0.4.0",
    "midas-calibrate>=0.2.7",
]
calib-v2 = [
    # Torch-native differentiable calibration / integration stack.
    # Companion to ``calib`` (v1, C-backed) — both can be installed
    # side-by-side, the v2 spec ↔ v1 paramstest adapter handles handoff.
    "midas-hkls>=0.4.1",
    "midas-calibrate-v2>=0.3.3",
    "midas-integrate-v2>=0.1.0",
    "midas-peakfit>=0.4.0",
]
plots = ["matplotlib>=3.5"]
dev = ["pytest>=7"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_suite*"]
