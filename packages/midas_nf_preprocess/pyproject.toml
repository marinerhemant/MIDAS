[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-nf-preprocess"
version = "0.1.1"
description = "Differentiable PyTorch port of NF-HEDM preprocessing (CPU/CUDA/MPS): hex grid, tomo filter, diffraction-spot prediction, image processing"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "NF-HEDM", "diffraction", "PyTorch", "differentiable",
    "image processing", "peak detection", "near-field", "preprocessing",
    "hex grid", "tomography",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Scientific/Engineering :: Image Processing",
]
dependencies = [
    "numpy>=1.22",
    "torch>=2.1",
    "tifffile>=2022.0",
    "midas-diffract>=0.1.0",
    "midas-stress>=0.6.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov", "scipy>=1.9"]
parity = ["scipy>=1.9"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS/tree/master/packages/midas_nf_preprocess"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-nf-preprocess = "midas_nf_preprocess.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_nf_preprocess*"]

[tool.pytest.ini_options]
markers = [
    "slow: long-running tests",
    "gpu: tests that require CUDA",
    "mps: tests that require Apple MPS",
    "parity: tests that compare to scipy reference implementations",
]
