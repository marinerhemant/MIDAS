[build-system]
requires = ["scikit-build-core>=0.8"]
build-backend = "scikit_build_core.build"

[project]
name = "midas-integrate"
version = "0.1.0"
description = "GPU-accelerated radial integration for synchrotron area detectors"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "integration", "radial", "azimuthal",
    "synchrotron", "powder diffraction", "pyFAI",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "h5py>=3.7",
    "zarr>=2.13,<3",
    "tifffile",
    "tqdm",
    "pandas>=1.5",
    # ABI-locked to the same-version shared-C library. Bump both packages
    # in lockstep; widen the upper bound once ABI is formally stabilised.
    "midas-auto-calibrate>=0.1.0,<0.2",
]

[project.optional-dependencies]
paper = ["matplotlib", "pyFAI", "fabio"]
gpu = ["midas-integrate-gpu"]
dev = ["pytest>=7.0", "pytest-cov", "build", "twine"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-integrate = "midas_integrate.cli:main_integrate"
midas-correct-image = "midas_integrate.cli:main_correct"
midas-integrate-batch = "midas_integrate.cli:main_batch"
midas-integrate-benchmark = "midas_integrate.cli:main_benchmark"
midas-integrate-server = "midas_integrate.cli:main_server"
midas-integrate-client = "midas_integrate.cli:main_client"
midas-integrate-fig-b = "midas_integrate.figures.paper_b:main"
midas-integrate-fig-c = "midas_integrate.figures.paper_c:main"

# --- scikit-build-core configuration ---

[tool.scikit-build]
minimum-version = "0.8"
build-dir = "build/{wheel_tag}"
wheel.packages = ["midas_integrate"]
cmake.version = ">=3.20"
cmake.build-type = "Release"
cmake.define.PACKAGE_VERSION = "0.1.0"

# --- cibuildwheel configuration (used by .github/workflows/wheels.yml) ---

[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-*"
skip = "*-musllinux_* pp* *-win*"
build-verbosity = 1
test-command = "python -c 'import midas_integrate; print(midas_integrate.__version__)'"

[tool.cibuildwheel.linux]
manylinux-x86_64-image = "quay.io/pypa/manylinux_2_28_x86_64"
before-all = "bash {project}/scripts/install_deps_linux.sh"

[tool.cibuildwheel.macos]
before-all = "bash {project}/scripts/install_deps_macos.sh"
environment = { MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--import-mode=importlib"
