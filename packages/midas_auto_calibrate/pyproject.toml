[build-system]
requires = ["scikit-build-core>=0.8", "setuptools_scm>=8"]
build-backend = "scikit_build_core.build"

[project]
name = "midas-auto-calibrate"
version = "0.1.0"
description = "Fully automated detector geometry calibration for synchrotron area detectors"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "calibration", "detector", "synchrotron",
    "powder diffraction", "geometry", "distortion",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "scipy>=1.8",
    "h5py>=3.7",
    "zarr>=2.13,<3",
    "Pillow",
    "scikit-image",
    "tifffile",
    "pandas>=1.5",
]

[project.optional-dependencies]
viz = ["matplotlib"]
viz-gui = ["matplotlib", "PyQt5>=5.15"]
paper = ["matplotlib", "pyFAI", "fabio"]
dev = ["pytest>=7.0", "pytest-cov", "build", "twine"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-auto-calibrate = "midas_auto_calibrate.cli:main_calibrate"
midas-calib-validate = "midas_auto_calibrate.cli:main_validate"
midas-calib-benchmark = "midas_auto_calibrate.cli:main_benchmark"
midas-calib-inspect = "midas_auto_calibrate.viz.cli:main_inspect"
midas-calib-viewer = "midas_auto_calibrate.viz.cli:main_viewer"
midas-calib-fig-convergence = "midas_auto_calibrate.figures.convergence:main"
midas-calib-fig-fourier = "midas_auto_calibrate.figures.fourier:main"
midas-calib-fig-distortion = "midas_auto_calibrate.figures.distortion:main"
midas-calib-fig-stage = "midas_auto_calibrate.figures.stage:main"

# --- scikit-build-core configuration ---

[tool.scikit-build]
minimum-version = "0.8"
build-dir = "build/{wheel_tag}"
wheel.packages = ["midas_auto_calibrate"]
cmake.version = ">=3.20"
cmake.build-type = "Release"
cmake.define.PACKAGE_VERSION = "0.1.0"

# Ship the bundled CeO2 calibrant (~21 MB) inside the wheel so end-to-end
# tests and the `midas_auto_calibrate.data` module work after pip install.
# Also included in the sdist for source-install completeness.

# --- cibuildwheel configuration (used by .github/workflows/wheels.yml) ---

[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-*"
skip = "*-musllinux_* pp* *-win*"
build-verbosity = 1
test-command = "python -c 'import midas_auto_calibrate; print(midas_auto_calibrate.__version__)'"

[tool.cibuildwheel.linux]
# manylinux_2_28 is based on AlmaLinux 8 and ships gcc's libgomp, so no
# OpenMP install needed. HDF5 + libTIFF via dnf. NLopt is FetchContent'd
# by CMakeLists.txt.
manylinux-x86_64-image = "quay.io/pypa/manylinux_2_28_x86_64"
before-all = "dnf install -y epel-release || true && dnf install -y hdf5-devel libtiff-devel && ldconfig"

[tool.cibuildwheel.macos]
# libomp is keg-only; OpenMP env hints come from CIBW_ENVIRONMENT_MACOS
# in wheels.yml so workflow_dispatch and release paths share them.
before-all = "brew install hdf5 libtiff libomp"
environment = { MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.pytest.ini_options]
testpaths = ["tests"]
# `importlib` mode prevents pytest from prepending the package root to
# sys.path, which would shadow the installed version (and its `_bin/`).
addopts = "--import-mode=importlib"
