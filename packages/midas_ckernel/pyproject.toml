[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-ckernel"
version = "0.1.0"
description = "Shared C kernels (diffraction forward model, Nelder-Mead, math) for the MIDAS c-omp indexer and refiner"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "diffraction", "forward-model", "C", "crystallography",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: C",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS/tree/master/packages/midas_ckernel"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_ckernel*"]

# Ship the shared C sources inside the wheel so downstream scikit-build-core
# builds can locate them via midas_ckernel.c_src_dir().
[tool.setuptools.package-data]
midas_ckernel = ["../c_src/*.c", "../c_src/*.h"]

[tool.pytest.ini_options]
markers = [
    "parity: compares the unified forward to the legacy indexer/refiner forwards",
]
