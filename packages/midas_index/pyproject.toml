[build-system]
requires = ["scikit-build-core>=0.10"]
build-backend = "scikit_build_core.build"

[project]
name = "midas-index"
version = "0.7.2"
description = "Pure-Python/PyTorch FF-HEDM indexer (drop-in replacement for IndexerOMP/IndexerGPU)"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "indexing", "PyTorch", "far-field", "diffraction",
    "crystallography", "polycrystal", "grain",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "torch>=2.0",
    "midas-diffract>=0.1.0",         # uses HEDMForwardModel.calc_bragg_geometry
    "midas-stress>=0.5.0,<1.0",      # torch-native orientation dispatch
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov", "pytest-benchmark"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS/tree/master/packages/midas_index"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-index = "midas_index.cli:main"

[tool.scikit-build]
cmake.minimum-version = "3.20"
cmake.source-dir = "."
wheel.packages = ["midas_index"]
# If the C target fails to build (no OpenMP, no compiler, missing FF_HEDM/
# source tree), the install still succeeds with Python-only — the CMakeLists
# returns early instead of erroring. backend_c.available() then returns False
# at runtime.
build-dir = "build/{wheel_tag}"

[tool.scikit-build.cmake.define]
# Lets cmake stamp the package version into midas_indexer's banner output.
SKBUILD_PROJECT_VERSION = "{project.version}"

[tool.pytest.ini_options]
markers = [
    "slow: full-pipeline regression tests (require reference dataset)",
    "gpu: tests that require CUDA",
    "mps: tests that require Apple MPS",
]
