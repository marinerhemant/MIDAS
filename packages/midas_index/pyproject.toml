[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-index"
version = "0.4.1"
description = "Pure-Python/PyTorch FF-HEDM indexer (drop-in replacement for IndexerOMP/IndexerGPU)"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "indexing", "PyTorch", "far-field", "diffraction",
    "crystallography", "polycrystal", "grain",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "torch>=2.0",
    "midas-diffract>=0.1.0",         # uses HEDMForwardModel.calc_bragg_geometry
    "midas-stress>=0.5.0,<1.0",      # torch-native orientation dispatch
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov", "pytest-benchmark"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS/tree/master/packages/midas_index"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-index = "midas_index.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_index*"]

[tool.pytest.ini_options]
markers = [
    "slow: full-pipeline regression tests (require reference dataset)",
    "gpu: tests that require CUDA",
    "mps: tests that require Apple MPS",
]
