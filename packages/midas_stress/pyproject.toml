[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-stress"
version = "0.8.0"
description = "Crystallographic stress-strain analysis with Voigt-Mandel notation and mechanical equilibrium constraints; torch-native API across orientation/frames/tensor/equilibrium/materials/plasticity/elastic_inverse"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "crystallography", "stress", "strain", "HEDM",
    "Voigt", "Mandel", "Hooke", "misorientation",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "scipy>=1.8",
    "torch>=2.0",
]

[project.optional-dependencies]
# Kept as a no-op alias for one release for callers who installed via
# `midas-stress[torch]` in 0.4.x; will be dropped in 0.6.0.
torch = []
dev = ["pytest>=7.0", "pytest-cov"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_stress*"]

[tool.setuptools.package-data]
midas_stress = ["_data/*.csv", "_data/*.h5"]

[tool.pytest.ini_options]
testpaths = ["tests"]
