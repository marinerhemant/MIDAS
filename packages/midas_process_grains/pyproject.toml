[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-process-grains"
version = "0.1.0"
description = "Pure-Python/PyTorch FF-HEDM grain-determination + strain pipeline (drop-in replacement for ProcessGrains)"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "grain-determination", "strain", "PyTorch", "far-field",
    "diffraction", "crystallography", "polycrystal", "ProcessGrains",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "scipy>=1.9",
    "torch>=2.0",
    "h5py>=3.7",
    "hdf5plugin>=4.0",
    "midas-stress>=0.5.0,<1.0",      # orientation, lattice→strain, Hooke's law, stiffness
    "midas-hkls>=0.1.0",             # hkl enumeration + space-group symmetry
    "midas-diffract>=0.1.0",         # HEDMForwardModel for Phase-3 arbitration
    "midas-transforms>=0.1.0",       # ParamsTest reader
    "midas-index>=0.3.0",            # bin / csv readers (hkls.csv etc.)
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov", "pytest-benchmark"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS/tree/master/packages/midas_process_grains"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-process-grains = "midas_process_grains.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_process_grains*"]

[tool.pytest.ini_options]
markers = [
    "slow: full-pipeline regression tests (require reference dataset)",
    "gpu: tests that require CUDA",
    "mps: tests that require Apple MPS",
    "regression: bit-for-bit tests against C ProcessGrains output",
]
