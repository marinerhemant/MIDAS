[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-hkls"
version = "0.5.0"
description = "Pure-Python crystallography, CIF I/O, and differentiable structure factors for X-ray diffraction."
readme = "README.md"
license = { text = "BSD-3-Clause" }
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pandas>=1.5",
    # Pull the CIF backend and torch into the dev extras so the full test
    # suite runs in CI. Without these, tests that hit the CIF reader or
    # the autograd structure-factor path fail (rather than skip) because
    # not every test carries a pytest.importorskip guard.
    "gemmi>=0.6",
    "torch>=2.0",
]
torch = [
    "torch>=2.0",
]
cif = [
    "gemmi>=0.6",
]
cif-pure = [
    "pycifrw>=4.4",
]
all = [
    "torch>=2.0",
    "gemmi>=0.6",
]

[project.scripts]
midas-hkls = "midas_hkls.cli:main"

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_hkls*"]

[tool.setuptools.package-data]
midas_hkls = ["data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
