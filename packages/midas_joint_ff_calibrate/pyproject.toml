[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-joint-ff-calibrate"
version = "0.1.6"
description = "Joint differentiable powder + FF-HEDM detector calibration for MIDAS. Breaks single-distance per-panel rank-1 degeneracy by combining a powder calibrant pseudo-strain residual with HEDM grain spot residuals in one Bayesian MAP + Laplace inference. Pure-Python, fully autograd-traced; consumes the shared midas_peakfit substrate (ParameterSpec, lm_minimise, laplace_at_map, TPSpline, zero_sum_residual) plus midas_calibrate_v2 (powder forward + pseudo_strain) and midas_fit_grain (HEDM spot forward)."
readme = "README.md"
license = { text = "BSD-3-Clause" }
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "torch>=2.1",
    "midas-peakfit>=0.4.0",
    "midas-calibrate-v2>=0.1.0",
    "midas-calibrate>=0.2.6",            # v1 params + pixel_to_REta_torch (DetCor); >=0.2.6 handles `;` terminators in paramstest
    "midas-fit-grain>=0.1.0",
    "midas-diffract>=0.1.0",
    "midas-hkls>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.scripts]
midas-joint-ff-calibrate = "midas_joint_ff_calibrate.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_joint_ff_calibrate*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
