[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-calibrate-v2"
version = "0.1.0"
description = "Fully differentiable detector calibration for MIDAS — multi-image, Bayesian, NN-residual, joint forward cake. Coexists with midas-calibrate v1."
readme = "README.md"
license = { text = "BSD-3-Clause" }
authors = [{name = "Hemant Sharma", email = "hsharma@anl.gov"}]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "scipy>=1.9",
    "torch>=2.1",
    "midas-hkls>=0.1.0",
    "midas-integrate>=0.1.0",
    "midas-peakfit>=0.2.0",
    "midas-calibrate>=0.2.0",
    "h5py>=3.0",
    "tifffile>=2022.0",
]

[project.optional-dependencies]
bayesian = ["pyro-ppl>=1.8"]
dev = ["pytest>=7", "pandas>=1.5"]
plots = ["matplotlib>=3.5"]
all = ["pyro-ppl>=1.8", "matplotlib>=3.5", "pytest>=7", "pandas>=1.5"]

[project.scripts]
midas-calibrate-v2 = "midas_calibrate_v2.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_calibrate_v2*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
