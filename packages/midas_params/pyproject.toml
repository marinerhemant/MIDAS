[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-params"
version = "0.2.0"
description = "MIDAS parameter-file registry, validator, and wizard for FF/NF/PF/RI pipelines"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "parameters", "validation", "wizard",
    "far-field", "near-field", "diffraction",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
]
# No hard runtime dependencies — pure stdlib for the core registry + validator.
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]
# Discovery module will eventually need these for HDF5/Zarr introspection.
discovery = ["h5py>=3.0", "zarr>=2.0", "numpy>=1.22"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS/tree/master/manuals"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-params = "midas_params.cli:main"

[tool.setuptools.packages.find]
where = ["."]
