[build-system]
requires = ["scikit-build-core>=0.10"]
build-backend = "scikit_build_core.build"

[project]
name = "midas-fit-grain"
version = "0.5.4"
description = "PyTorch single/multi-grain refiner (drop-in replacement for FitPosOrStrainsOMP / FitPosOrStrainsGPU) + bundled c-omp C refiner"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "MIDAS", "HEDM", "grain-refinement", "PyTorch", "far-field",
    "diffraction", "crystallography", "polycrystal",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "torch>=2.0",
    "scipy>=1.10",
    "midas-diffract>=0.1.0",
    "midas-params>=0.3.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov"]

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Documentation = "https://github.com/marinerhemant/MIDAS/tree/master/packages/midas_fit_grain"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[project.scripts]
midas-fit-grain = "midas_fit_grain.cli:main"

[tool.scikit-build]
cmake.version = ">=3.20"
cmake.source-dir = "."
wheel.packages = ["midas_fit_grain"]
# If the C target fails to build (no OpenMP / no compiler), the install still
# succeeds Python-only — CMakeLists returns early instead of erroring, and
# backend_c.available() then returns False at runtime.
build-dir = "build/{wheel_tag}"

[tool.scikit-build.cmake.define]
SKBUILD_PROJECT_VERSION = "{project.version}"

[tool.pytest.ini_options]
markers = [
    "slow: full-pipeline regression tests (require reference dataset)",
    "gpu: tests that require CUDA",
    "mps: tests that require Apple MPS",
    "parity: tests that compare against the C reference (FitPosOrStrainsOMP)",
]
