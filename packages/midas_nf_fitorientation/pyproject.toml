[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "midas-nf-fitorientation"
version = "0.3.1"
description = "Differentiable NF-HEDM orientation and calibration fitter (drop-in replacement for FitOrientationOMP, FitOrientationParameters, FitOrientationParametersMultiPoint)"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.9"
authors = [
    {name = "Hemant Sharma", email = "hsharma@anl.gov"},
]
keywords = [
    "HEDM", "NF-HEDM", "differentiable physics", "PyTorch",
    "orientation fitting", "calibration", "L-BFGS",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22",
    "scipy>=1.7",
    "torch>=2.0",
    "midas-diffract>=0.1.0",
    "midas-stress>=0.6.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov"]

[project.scripts]
midas-nf-fit-orientation = "midas_nf_fitorientation.cli:fit_orientation_main"
midas-nf-fit-parameters = "midas_nf_fitorientation.cli:fit_parameters_main"
midas-nf-fit-multipoint = "midas_nf_fitorientation.cli:fit_multipoint_main"

[project.urls]
Homepage = "https://github.com/marinerhemant/MIDAS"
Issues = "https://github.com/marinerhemant/MIDAS/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["midas_nf_fitorientation*"]
