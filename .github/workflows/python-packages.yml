name: Python Packages (test + publish)

on:
  push:
    branches: [master]
    paths:
      - 'packages/**'
      - '.github/workflows/python-packages.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/**'
  release:
    types: [published]

jobs:
  # ─── Tests run on every push / PR / release for BOTH packages ─────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.11', '3.12']
        package:
          - midas_stress
          - midas_params
          - midas_auto_calibrate
          - midas_integrate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # C-compiled packages need system libs (HDF5, libTIFF, OpenMP, and —
      # for midas-integrate — BLOSC2 + libzip). NLopt is FetchContent'd by
      # our CMake files so no system install needed for that.
      - name: Install C build deps (Linux, C-compiled packages only)
        if: >-
          (matrix.package == 'midas_auto_calibrate' ||
           matrix.package == 'midas_integrate')
          && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libhdf5-dev libtiff-dev libomp-dev
          # midas_integrate additionally needs BLOSC2 + libzip for ZarrReader.
          if [[ "${{ matrix.package }}" == "midas_integrate" ]]; then
            sudo apt-get install -y libblosc2-dev libzip-dev
          fi

      - name: Install C build deps (macOS, C-compiled packages only)
        if: >-
          (matrix.package == 'midas_auto_calibrate' ||
           matrix.package == 'midas_integrate')
          && runner.os == 'macOS'
        run: |
          brew update
          brew install cmake hdf5 libtiff libomp
          if [[ "${{ matrix.package }}" == "midas_integrate" ]]; then
            brew install c-blosc2 libzip
          fi

      # midas_integrate has a hard dep on midas_auto_calibrate for the
      # shared DetectorGeometry dataclass + midas_bin() discovery chain.
      # Install it first so pytest doesn't choke on the import.
      - name: Install midas_auto_calibrate first (required by midas_integrate)
        if: matrix.package == 'midas_integrate'
        run: pip install -e "packages/midas_auto_calibrate"

      - name: Install ${{ matrix.package }} (editable, with dev extras)
        run: pip install -e "packages/${{ matrix.package }}[dev]"

      - name: Run tests for ${{ matrix.package }}
        run: |
          cd packages/${{ matrix.package }}
          python -m pytest tests/ -v --tb=short

  # ─── Build + publish: triggered by GitHub release only ────────────────────
  # The tag name selects which package to publish:
  #   midas-stress-v*          → midas_stress   (pure Python, handled here)
  #   midas-params-v*          → midas_params   (pure Python, handled here)
  #
  # C-compiled packages (midas-auto-calibrate, midas-integrate,
  # midas-integrate-gpu) are handled by wheels.yml via cibuildwheel, not
  # this workflow — we skip them here.
  #
  # Release tags without a recognised prefix are ignored (no-op build).
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    outputs:
      package: ${{ steps.which.outputs.package }}
      pypi_name: ${{ steps.which.outputs.pypi_name }}
    steps:
      - uses: actions/checkout@v4

      - id: which
        name: Identify package from tag
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "Tag: $TAG"
          if [[ "$TAG" == midas-stress-v* ]]; then
            echo "package=midas_stress" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-stress" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-params-v* ]]; then
            echo "package=midas_params" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-params" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-auto-calibrate-v* ]] || \
               [[ "$TAG" == midas-integrate-v* ]] || \
               [[ "$TAG" == midas-integrate-gpu-v* ]]; then
            echo "Tag $TAG belongs to a C-compiled package; delegated to wheels.yml."
            echo "package=" >> "$GITHUB_OUTPUT"
            echo "pypi_name=" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not match any known package prefix; skipping."
            echo "package=" >> "$GITHUB_OUTPUT"
            echo "pypi_name=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.which.outputs.package != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        if: steps.which.outputs.package != ''
        run: pip install build

      - name: Build sdist and wheel
        if: steps.which.outputs.package != ''
        run: |
          cd packages/${{ steps.which.outputs.package }}
          python -m build

      - name: Upload artifacts
        if: steps.which.outputs.package != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.which.outputs.pypi_name }}-dist
          path: packages/${{ steps.which.outputs.package }}/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && needs.build.outputs.package != ''
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (OIDC)

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.pypi_name }}-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC). One-time setup per package at pypi.org:
        # Settings > Publishing > Add a new pending publisher
        #   Owner: marinerhemant
        #   Repo: MIDAS
        #   Workflow: python-packages.yml
        #   Environment: pypi
        # The same GitHub environment (pypi) is shared across packages;
        # the PyPI side identifies which project to publish to by the
        # PyPI project name baked into the uploaded dist/*.
